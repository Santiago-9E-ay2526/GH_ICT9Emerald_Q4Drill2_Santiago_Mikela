<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Q4-Drill2</title>

     <link rel="stylesheet" href="styles.css">    

     <!-- BOOTSTRAP -->
     <!-- Latest compiled and minified CSS -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

     <!-- Latest compiled JavaScript -->
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

     <!-- GOOGLE FONTS -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

</head>
<body>

     <div class="container">
     <h1>Heat Index Checker</h1>
          <div id="instructionsBtn">
               <details ontoggle="alert('Note: Input the temperature (°C) and humidity (%), then click Check to see the heat index and its status.')">
                    <summary class="btn btn-sm btn-outline-light mb-3 form-control mx-auto" id="instructions">Instructions</summary>
               </details>
          </div>

          <!-- DEGREE IN CELSIUS -->
          <div id="cInput">
               <label id="cels">Degree in °C</label>
               <input type="number" id="degree" placeholder="Input degree value..." class="form-control mx-auto">
          </div>

          <div id="hInput">
               <label id="hum">Humidity in %</label>
               <input type="number" id="humidity" placeholder="Input percentage value..." class="form-control mx-auto">
          </div>
          
               <div id="checkBtn">
                    <button onclick="theCheck()" type="button" class="btn btn-warning mt-3">Check</button>
               </div>
     </div>

     <script src="main.js"></script>

</body>
</html>
